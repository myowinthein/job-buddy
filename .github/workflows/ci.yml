name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    name: Lint, compile, build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm compile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
