name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Build, publish to Chrome Web Store, create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm compile

      - name: Build and zip extension
        run: pnpm zip

      - name: Locate generated zip
        id: zip
        run: |
          ZIP_PATH=$(ls .output/*-chrome.zip | head -n1)
          echo "path=$ZIP_PATH" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$ZIP_PATH")" >> "$GITHUB_OUTPUT"

      - name: Debug env vars
        env:
          CLI_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CLI_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CLI_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CLI_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
        run: |
          echo "CLI_EXTENSION_ID is set: ${{ env.CLI_EXTENSION_ID != '' }}"
          echo "CLI_CLIENT_ID is set: ${{ env.CLI_CLIENT_ID != '' }}"
          echo "CLI_CLIENT_SECRET is set: ${{ env.CLI_CLIENT_SECRET != '' }}"
          echo "CLI_REFRESH_TOKEN is set: ${{ env.CLI_REFRESH_TOKEN != '' }}"

      - name: Upload to Chrome Web Store and submit for review
        env:
          CLI_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CLI_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CLI_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CLI_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
        run: |
          npx --yes chrome-webstore-upload-cli@3 upload \
            --source "${{ steps.zip.outputs.path }}" \
            --auto-publish

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.zip.outputs.path }}
          generate_release_notes: true
