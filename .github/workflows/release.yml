name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Build, publish to Chrome Web Store, create GitHub Release
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm compile

      - name: Build and zip extension
        run: pnpm zip

      - name: Locate generated zip
        id: zip
        run: |
          ZIP_PATH=$(ls .output/*-chrome.zip | head -n1)
          echo "path=$ZIP_PATH" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$ZIP_PATH")" >> "$GITHUB_OUTPUT"

      - name: Read tag annotation message
        id: tag
        run: |
          MSG=$(git tag -l --format='%(contents)' "${{ github.ref_name }}")
          if echo "$MSG" | grep -qi "draft"; then
            echo "auto_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "auto_publish=true"  >> "$GITHUB_OUTPUT"
          fi

      - name: Upload to Chrome Web Store
        run: |
          [ "${{ steps.tag.outputs.auto_publish }}" = "true" ] && PUBLISH="--auto-publish" || PUBLISH=""
          npx --yes chrome-webstore-upload-cli@3 upload \
            --source "${{ steps.zip.outputs.path }}" \
            --extension-id "${{ secrets.CHROME_EXTENSION_ID }}" \
            --client-id "${{ secrets.CHROME_CLIENT_ID }}" \
            --client-secret "${{ secrets.CHROME_CLIENT_SECRET }}" \
            --refresh-token "${{ secrets.CHROME_REFRESH_TOKEN }}" \
            $PUBLISH

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.zip.outputs.path }}
          generate_release_notes: true
